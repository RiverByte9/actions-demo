name: CI Tests

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run simple test
        run: |
          echo "🚀 Running tests..."
          echo "✅ All tests passed!"   # This line makes the test pass
          # To make it FAIL on purpose later, change the line above to:
          # echo "❌ Test failed!" && exit 1